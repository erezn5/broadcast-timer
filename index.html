<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Broadcast Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <main class="timers">
      <section class="timer-card">
        <input class="timer-title" type="text" placeholder="תיאור קאונטר" />

        <div class="timer-display" id="display1">00:00:00</div>

        <div class="control-row control-row-top">
          <button id="up1">UP</button>
          <button id="down1">DN</button>
          <div class="time-inputs">
            <input id="hours1" maxlength="2" value="00" />
            <span>:</span>
            <input id="minutes1" maxlength="2" value="00" />
            <span>:</span>
            <input id="seconds1" maxlength="2" value="00" />
          </div>
          <button id="set1">SET</button>
        </div>

        <div class="control-row control-row-bottom">
          <button id="start1">START</button>
          <button id="reset1">RESET</button>
        </div>

        <div class="timer-progress">
          <div class="timer-progress-fill" id="progressFill1"></div>
        </div>
      </section>

      <section class="timer-card">
        <input class="timer-title" type="text" placeholder="תיאור קאונטר" />

        <div class="timer-display" id="display2">00:00:00</div>

        <div class="control-row control-row-top">
          <button id="up2">UP</button>
          <button id="down2">DN</button>
          <div class="time-inputs">
            <input id="hours2" maxlength="2" value="00" />
            <span>:</span>
            <input id="minutes2" maxlength="2" value="00" />
            <span>:</span>
            <input id="seconds2" maxlength="2" value="00" />
          </div>
          <button id="set2">SET</button>
        </div>

        <div class="control-row control-row-bottom">
          <button id="start2">START</button>
          <button id="reset2">RESET</button>
        </div>

        <div class="timer-progress">
          <div class="timer-progress-fill" id="progressFill2"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-left">
        <img src="logo.png" alt="logo" class="logo" onerror="this.style.display='none'">
        <div class="footer-credits">
          <div class="footer-credit-line">אפיון: שי בכר | פיתוח: ארז נעים</div>
          <div class="footer-credit-line">כל הזכויות שמורות 2026</div>
        </div>
      </div>

      <div class="footer-center">
        <div class="system-clock" id="systemClock">00:00:00</div>
      </div>

      <div class="footer-right">
        <div class="footer-top-controls">
          <div id="layoutToggle" class="layout-toggle" role="group" aria-label="Layout toggle">
            <button type="button" class="layout-option" data-layout="single" aria-pressed="false">שעון 1</button>
            <button type="button" class="layout-option" data-layout="double" aria-pressed="true">2 שעונים</button>
          </div>
          <button
            id="clockSettingsToggleBtn"
            class="clock-settings-toggle-btn"
            type="button"
            aria-label="הגדרות סנכרון שעון"
            aria-controls="clockSettingsPanel"
            aria-expanded="false"
            title="הגדרות סנכרון שעון"
          >
            <span aria-hidden="true">⚙</span>
          </button>
        </div>
        <div class="system-clock-controls">
          <div class="system-clock-inputs">
            <input id="sysHours" maxlength="2" value="00" aria-label="System clock hours" />
            <span>:</span>
            <input id="sysMinutes" maxlength="2" value="00" aria-label="System clock minutes" />
            <span>:</span>
            <input id="sysSeconds" maxlength="2" value="00" aria-label="System clock seconds" />
          </div>
          <button id="systemClockSetBtn" class="system-clock-set-btn" type="button">SET</button>
        </div>
      </div>
    </footer>
  </div>

  <div id="clockSettingsPanel" class="clock-settings-modal" hidden>
    <div class="clock-settings-dialog" role="dialog" aria-modal="true" aria-labelledby="clockSettingsTitle">
      <div class="clock-settings-header">
        <h2 id="clockSettingsTitle" class="clock-settings-title">סנכרון שעון NTP</h2>
        <button id="clockSettingsCloseBtn" class="clock-settings-close-btn" type="button" aria-label="סגירת חלון הגדרות">✕</button>
      </div>
      <label class="clock-settings-label" for="ntpServerSelect">שרת NTP</label>
      <div class="clock-settings-form">
        <select id="ntpServerSelect" aria-label="NTP server" dir="ltr">
          <option value="">ללא NTP (שעון מחשב)</option>
          <option value="0.il.pool.ntp.org">0.il.pool.ntp.org</option>
          <option value="1.il.pool.ntp.org">1.il.pool.ntp.org</option>
          <option value="2.il.pool.ntp.org">2.il.pool.ntp.org</option>
          <option value="3.il.pool.ntp.org">3.il.pool.ntp.org</option>
          <option value="il.pool.ntp.org">il.pool.ntp.org</option>
          <option value="pool.ntp.org">pool.ntp.org</option>
          <option value="time.google.com">time.google.com</option>
          <option value="time.cloudflare.com">time.cloudflare.com</option>
          <option value="time.windows.com">time.windows.com</option>
          <option value="time.apple.com">time.apple.com</option>
          <option value="__custom__">Custom...</option>
        </select>
        <button id="ntpServerSaveBtn" type="button">שמור</button>
        <button id="ntpSyncNowBtn" type="button">סנכרן</button>
      </div>
      <input
        class="clock-settings-custom-input"
        id="ntpServerCustomInput"
        type="text"
        placeholder="Enter custom NTP host"
        aria-label="Custom NTP server address"
        dir="ltr"
        hidden
      />
      <div id="ntpStatus" class="clock-settings-status" role="status" aria-live="polite"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
